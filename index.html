<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>رفيق | Rafeeq - Cairo Transit Companion</title>
  <!-- Tailwind + Fonts + Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Cairo', 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #f0fdf4, #ecfdf5 50%, #f0f9ff); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .phone-mock { width: 390px; height: 844px; border-radius: 46px; background: #F8FAFB; box-shadow: 0 40px 100px rgba(16,185,129,.16),0 8px 30px rgba(0,0,0,.14); border: 8px solid #111; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .glass{ background: rgba(255,255,255,.75); backdrop-filter: blur(14px); }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .fade-in { animation: fi .3s ease both; }
    @keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .content-scroll { overflow-y: auto; flex: 1; padding-bottom: 20px; scrollbar-width: none; }
    .content-scroll::-webkit-scrollbar { display: none; }
    .modal-overlay { position: absolute; inset: 0; z-index: 50; background: white; border-radius: 36px; display: flex; flex-direction: column; overflow: hidden; }
    .transition-expand { transition: all 0.2s ease; }
    button, .clickable { cursor: pointer; }
    [dir="rtl"] { text-align: right; }
  </style>
</head>
<body>
<div class="phone-mock">
  <!-- status bar simulation -->
  <div class="flex justify-between items-center px-7 pt-3 pb-1 bg-white relative shrink-0">
    <span class="text-xs font-bold text-gray-800">9:41</span>
    <div class="absolute left-1/2 -translate-x-1/2 top-1.5 bg-black rounded-full w-[126px] h-[30px]"></div>
    <div class="flex items-center gap-1.5"><i data-lucide="wifi" size="12" class="text-gray-700"></i><i data-lucide="battery" size="14" class="text-gray-700"></i></div>
  </div>

  <!-- dynamic main content (will be replaced by JS) -->
  <div id="app-root" class="flex flex-col flex-1 overflow-hidden"></div>
</div>

<script>
  // ---------- BRAND COLORS ----------
  const EM = "#10B981", EM_D = "#059669", EM_L = "#D1FAE5", EM_M = "#6EE7B7", GRAY = "#F9FAFB", BORDER = "#E5E7EB";

  // ---------- MOCK USER DATA ----------
  const INITIAL_USER_DATA = {
    profile: { name: "فرح", nameEn: "Farah", avatar: "ف", memberSince: "٢٠٢٤", location: "الجيزة، القاهرة" },
    savedLocations: [
      { id: "home", label: "المنزل", labelEn: "Home", icon: "home", address: "المعادي، طره", coords: { lat: 29.9602, lng: 31.2569 }, color: "#EFF6FF", accent: "#3B82F6" },
      { id: "work", label: "العمل", labelEn: "Work", icon: "work", address: "الدقي، الجيزة", coords: { lat: 30.0444, lng: 31.2103 }, color: "#FFF7ED", accent: "#F97316" },
      { id: "uni", label: "الجامعة", labelEn: "University", icon: "star", address: "جامعة القاهرة، الجيزة", coords: { lat: 30.0262, lng: 31.2131 }, color: EM_L, accent: EM_D }
    ],
    routeHistory: [
      { id: "r1", from: "المنزل (المعادي)", to: "جامعة القاهرة", date: "اليوم، ٧:٣٠ ص", transport: ["metro", "walk"], duration: "٢٨ دقيقة", cost: 9, status: "completed" },
      { id: "r2", from: "جامعة القاهرة", to: "الدقي", date: "أمس، ٢:١٥ م", transport: ["metro"], duration: "١٢ دقيقة", cost: 7, status: "completed" },
      { id: "r3", from: "الدقي", to: "المنزل (المعادي)", date: "أمس، ٦:٤٥ م", transport: ["metro", "microbus"], duration: "٣٥ دقيقة", cost: 12, status: "completed" },
      { id: "r4", from: "المنزل (المعادي)", to: "العتبة", date: "الثلاثاء، ١١:٠٠ ص", transport: ["metro"], duration: "٢٠ دقيقة", cost: 7, status: "completed" }
    ],
    frequentRoutes: [
      { id: "fr1", name: "المنزل ← جامعة القاهرة", nameEn: "Home → Cairo University", fromId: "home", toId: "uni", frequency: 5, lastUsed: "اليوم", routes: { fastest: { label: "الأسرع", labelEn: "Fastest", steps: [{ type: "metro", line: "الخط الأول", from: "المعادي", to: "السادات", stops: 5, duration: 14 },{ type: "metro", line: "الخط الثاني", from: "السادات", to: "الجيزة", stops: 3, duration: 8 },{ type: "walk", from: "محطة الجيزة", to: "جامعة القاهرة", duration: 6 }], totalDuration: 28, totalCost: 9, color: EM, bg: EM_L }, budget: { label: "الأوفر", labelEn: "Budget", steps: [{ type: "microbus", line: "المعادي ← التحرير", from: "المعادي", to: "ميدان التحرير", duration: 25 },{ type: "microbus", line: "التحرير ← الجامعة", from: "ميدان التحرير", to: "جامعة القاهرة", duration: 15 }], totalDuration: 45, totalCost: 6, color: "#F59E0B", bg: "#FEF3C7" } } },
      { id: "fr2", name: "المنزل ← العمل (الدقي)", nameEn: "Home → Work (Dokki)", fromId: "home", toId: "work", frequency: 4, lastUsed: "أمس", routes: { fastest: { label: "الأسرع", labelEn: "Fastest", steps: [{ type: "metro", line: "الخط الأول", from: "المعادي", to: "السادات", stops: 5, duration: 14 },{ type: "metro", line: "الخط الثاني", from: "السادات", to: "الدقي", stops: 2, duration: 6 }], totalDuration: 22, totalCost: 7, color: EM, bg: EM_L }, budget: { label: "الأوفر", labelEn: "Budget", steps: [{ type: "metro", line: "الخط الأول", from: "المعادي", to: "المنيب", stops: 3, duration: 10 },{ type: "microbus", line: "المنيب ← الدقي", from: "المنيب", to: "الدقي", duration: 20 }], totalDuration: 35, totalCost: 5, color: "#F59E0B", bg: "#FEF3C7" } } }
    ],
    liveUpdates: [
      { id: "lu1", text: "الخط الأول يعمل بانتظام", en: "Line 1 running smoothly", status: "ok", line: "metro1" },
      { id: "lu2", text: "تأخير خفيف في الخط الثاني (١٠ دقائق)", en: "Minor delay on Line 2 (~10 min)", status: "warn", line: "metro2" },
      { id: "lu3", text: "مونوريل شرق النيل: خدمة طبيعية", en: "East Nile Monorail: Normal", status: "ok", line: "mono_east" },
      { id: "lu4", text: "ازدحام على كورنيش النيل", en: "Traffic on Nile Corniche", status: "warn", line: "traffic" },
      { id: "lu5", text: "أتوبيس ٣٥٦ في الموعد", en: "Bus 356 on schedule", status: "ok", line: "bus356" }
    ],
    transportSchedules: [
      { id: "ts1", name: "Metro Line 1 – الخط الأول", type: "metro", color: "#EF4444", firstTrain: "05:30", lastTrain: "01:00", frequency: "5-7 دقائق", stations: 35 },
      { id: "ts2", name: "Metro Line 2 – الخط الثاني", type: "metro", color: "#3B82F6", firstTrain: "05:30", lastTrain: "01:00", frequency: "5-7 دقائق", stations: 20 },
      { id: "ts3", name: "Metro Line 3 – الخط الثالث", type: "metro", color: "#8B5CF6", firstTrain: "06:00", lastTrain: "00:30", frequency: "7-10 دقائق", stations: 34 },
      { id: "ts4", name: "Monorail East – مونوريل شرق النيل", type: "mono", color: "#EC4899", firstTrain: "06:00", lastTrain: "00:00", frequency: "10 دقائق", stations: 22 },
      { id: "ts5", name: "Bus 356 – أتوبيس ٣٥٦", type: "bus", color: "#06B6D4", firstTrain: "06:00", lastTrain: "22:00", frequency: "15-20 دقيقة", stations: null }
    ]
  };

  // ---------- GLOBAL STATE ----------
  let appState = {
    userData: JSON.parse(JSON.stringify(INITIAL_USER_DATA)),
    mode: "public",
    nav: "home",
    showSearch: false,
    showSync: false,
    tripDetail: null,
    liveIdx: 0,
    liveVisible: true
  };
  let liveInterval = null;

  // ---------- HELPERS ----------
  const METRO_STATIONS = ["الحلمية","السادات","أوبرا","دار السلام","المعادي","هادي","طره البلد","كوبري عباس","المنيب","الجيزة","فيصل","الدقي","الكيت كات","إمبابة","المرج","عين شمس","هليوبوليس","النزهة","مدينة نصر","الشهداء","الزاوية الحمراء","العباسية","العتبة","محمد نجيب","الماسة","المقطم"];
  function searchAll(q, userData) {
    if (!q.trim()) return [];
    const res = [];
    METRO_STATIONS.forEach(s => { if (s.includes(q)) res.push({ type: "metro", label: s, sub: "محطة مترو", price: 7 }); });
    userData.savedLocations.forEach(loc => { if (loc.label.includes(q) || loc.address.includes(q)) res.push({ type: "saved", label: loc.label, sub: loc.address, price: null, accent: loc.accent }); });
    userData.frequentRoutes.forEach(fr => { if (fr.name.includes(q)) res.push({ type: "route", label: fr.name, sub: `${fr.routes.fastest.totalDuration} دقيقة • ${fr.routes.fastest.totalCost} ج`, price: fr.routes.fastest.totalCost }); });
    [{ num: "356", from: "التحرير", to: "فيصل", price: 3 }, { num: "92", from: "رمسيس", to: "مصر الجديدة", price: 4 }].forEach(r => { if (r.from.includes(q) || r.to.includes(q) || r.num.includes(q)) res.push({ type: "bus", label: `أتوبيس ${r.num}`, sub: `${r.from} ← ${r.to}`, price: r.price }); });
    return res.slice(0, 8);
  }
  function typeStyle(t) { const map = { metro: { bg: "#FEF2F2", ic: "train" }, bus: { bg: "#EFF6FF", ic: "bus" }, microbus: { bg: "#FFFBEB", ic: "truck" }, mono: { bg: "#F5F3FF", ic: "train" }, route: { bg: EM_L, ic: "route" }, saved: { bg: "#F0FDF4", ic: "book-marked" }, walk: { bg: "#F9FAFB", ic: "navigation" } }; return map[t] || { bg: "#F3F4F6", ic: "map-pin" }; }

  // CairoMap SVG as string
  function CairoMapSVG(height = 140) { return `<svg viewBox="0 0 320 160" style="width:100%; height:${height}px" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="mg2" cx="50%" cy="50%" r="70%"><stop offset="0%" stopColor="#ECFDF5"/><stop offset="100%" stopColor="#C6F6D5"/></radialGradient><filter id="gl2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="320" height="160" fill="url(#mg2)" rx="0"/><line x1="40" y1="0" x2="40" y2="160" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="80" y1="0" x2="80" y2="160" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="120" y1="0" x2="120" y2="160" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="160" y1="0" x2="160" y2="160" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="200" y1="0" x2="200" y2="160" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="240" y1="0" x2="240" y2="160" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="280" y1="0" x2="280" y2="160" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="0" y1="40" x2="320" y2="40" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="0" y1="80" x2="320" y2="80" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><line x1="0" y1="120" x2="320" y2="120" stroke="#A7F3D0" stroke-width="0.5" opacity="0.4"/><path d="M148 0 Q155 40 150 80 Q145 120 152 160" stroke="#BAE6FD" stroke-width="20" fill="none" opacity=".65" stroke-linecap="round"/><path d="M148 0 Q155 40 150 80 Q145 120 152 160" stroke="#93C5FD" stroke-width="9" fill="none" opacity=".45"/><path d="M60 20 L80 50 L100 75 L130 95 L160 110 L200 130 L240 148" stroke="#EF4444" stroke-width="3" fill="none" stroke-dasharray="7,3" opacity=".85"/><path d="M20 90 L60 88 L100 85 L140 82 L180 80 L220 78 L280 76" stroke="#3B82F6" stroke-width="3" fill="none" stroke-dasharray="7,3" opacity=".85"/><path d="M100 10 L110 40 L120 70 L135 100 L150 130 L160 155" stroke="#8B5CF6" stroke-width="3" fill="none" stroke-dasharray="7,3" opacity=".85"/><rect x="30" y="30" width="28" height="18" rx="3" fill="white" opacity=".45"/><rect x="70" y="25" width="22" height="14" rx="3" fill="white" opacity=".45"/><rect x="110" y="18" width="20" height="16" rx="3" fill="white" opacity=".45"/><rect x="180" y="30" width="26" height="16" rx="3" fill="white" opacity=".45"/><rect x="50" y="60" width="30" height="16" rx="3" fill="white" opacity=".45"/><rect x="170" y="60" width="24" height="16" rx="3" fill="white" opacity=".45"/><circle cx="80" cy="50" r="4.5" fill="white" stroke="#EF4444" stroke-width="2"/><circle cx="130" cy="95" r="4.5" fill="white" stroke="#EF4444" stroke-width="2"/><circle cx="200" cy="130" r="4.5" fill="white" stroke="#EF4444" stroke-width="2"/><circle cx="60" cy="88" r="4.5" fill="white" stroke="#3B82F6" stroke-width="2"/><circle cx="140" cy="82" r="4.5" fill="white" stroke="#3B82F6" stroke-width="2"/><circle cx="220" cy="78" r="4.5" fill="white" stroke="#3B82F6" stroke-width="2"/><circle cx="120" cy="70" r="4.5" fill="white" stroke="#8B5CF6" stroke-width="2"/><g filter="url(#gl2)"><circle cx="148" cy="70" r="13" fill="${EM}" opacity=".2"/><circle cx="148" cy="70" r="8" fill="${EM}" opacity=".45"/><circle cx="148" cy="70" r="5" fill="${EM}"/><circle cx="148" cy="70" r="2.5" fill="white"/></g><circle cx="148" cy="70" r="16" fill="none" stroke="${EM}" stroke-width="1.5" opacity=".35"><animate attributeName="r" values="12;24;12" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".4;0;.4" dur="2.2s" repeatCount="indefinite"/></circle><rect x="7" y="134" width="124" height="20" rx="5" fill="white" opacity=".9"/><circle cx="17" cy="144" r="3.5" fill="#EF4444"/><text x="24" y="148" font-size="7.5" fill="#374151">خط١</text><circle cx="50" cy="144" r="3.5" fill="#3B82F6"/><text x="57" y="148" font-size="7.5" fill="#374151">خط٢</text><circle cx="83" cy="144" r="3.5" fill="#8B5CF6"/><text x="90" y="148" font-size="7.5" fill="#374151">خط٣</text></svg>`; }

  // re-render full UI
  function render() {
    const root = document.getElementById("app-root");
    if (!root) return;
    const header = renderHeader();
    const modeToggle = renderModeToggle();
    const content = renderMainContent();
    const bottomNav = renderBottomNav();
    root.innerHTML = `<div class="flex flex-col h-full">${header}${modeToggle}<div class="content-scroll px-5 pt-2" dir="rtl">${content}</div>${bottomNav}</div>`;
    lucide.createIcons();
    attachGlobalEvents();
    if (appState.showSearch) renderSearchOverlay();
    if (appState.showSync) renderSyncOverlay();
    if (appState.tripDetail) renderTripOverlay();
    startLiveTicker();
  }

  function renderHeader() {
    return `<div class="px-5 pt-3 pb-3 bg-white shadow-sm shrink-0"><div class="flex items-center justify-between mb-3"><div class="flex items-center gap-2.5"><div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-black text-sm shadow-md" style="background:linear-gradient(135deg,${EM},${EM_D})">${appState.userData.profile.avatar}</div><div><p class="text-xs text-gray-400">صباح الخير يا</p><p class="text-sm font-black text-gray-800 -mt-0.5">${appState.userData.profile.name} ✨</p></div></div><div class="flex items-center gap-2"><button data-action="openSync" class="w-8 h-8 rounded-xl flex items-center justify-center transition active:scale-90" style="background:${EM_L}"><i data-lucide="database" size="15" color="${EM_D}"></i></button><div class="text-left"><p class="text-xs text-gray-400 leading-none">رفيق</p><p class="text-sm font-black leading-none" style="color:${EM}">Rafeeq</p></div><div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:${EM_L}"><i data-lucide="sparkles" size="16" color="${EM_D}"></i></div></div></div><button data-action="openSearch" class="w-full flex items-center gap-2 rounded-2xl px-3 py-2.5 transition" style="background:#F3F4F6; border:1.5px solid ${BORDER}"><i data-lucide="search" size="15" color="#9CA3AF"></i><span class="text-sm text-gray-400 flex-1 text-right">ابحث عن مسار أو محطة...</span><span class="text-xs px-2 py-0.5 rounded-lg font-bold" style="background:${EM_L};color:${EM_D}">AI</span></button></div>`;
  }
  function renderModeToggle() {
    return `<div class="px-5 pt-3 pb-3 bg-white shrink-0"><div class="flex rounded-2xl p-1 gap-1" style="background:#F3F4F6"><button data-mode="public" class="flex-1 flex flex-col items-center justify-center py-2 rounded-xl transition ${appState.mode === 'public' ? 'text-white' : 'text-gray-500'}" style="${appState.mode === 'public' ? `background:linear-gradient(135deg,${EM},${EM_D});box-shadow:0 4px 14px rgba(16,185,129,.32)` : 'background:transparent'}"><span class="text-sm font-bold">مواصلات عامة</span><span class="text-xs">Public Transport</span></button><button data-mode="car" class="flex-1 flex flex-col items-center justify-center py-2 rounded-xl transition ${appState.mode === 'car' ? 'text-white' : 'text-gray-500'}" style="${appState.mode === 'car' ? `background:linear-gradient(135deg,${EM},${EM_D});box-shadow:0 4px 14px rgba(16,185,129,.32)` : 'background:transparent'}"><span class="text-sm font-bold">أصحاب السيارات</span><span class="text-xs">Car Owners</span></button></div></div>`;
  }
  function renderMainContent() {
    if (appState.mode === "car") return renderCarPage();
    if (appState.nav === "home") return renderHomePage();
    if (appState.nav === "map") return renderMapPage();
    if (appState.nav === "tickets") return renderTicketsPage();
    return renderProfilePage();
  }
  function renderHomePage() {
    const user = appState.userData;
    const liveUpdate = user.liveUpdates[appState.liveIdx];
    const tickerHtml = `<div class="flex items-center gap-2 bg-white rounded-2xl px-3 py-2.5 shadow-sm mb-4" style="border:1px solid ${EM_L}"><div class="flex items-center gap-1.5 shrink-0"><span class="w-2 h-2 rounded-full animate-pulse" style="background:${liveUpdate.status === 'ok' ? EM : '#F59E0B'}"></span><i data-lucide="radio" size="12" color="${liveUpdate.status === 'ok' ? EM : '#F59E0B'}"></i><span class="text-xs font-bold" style="color:${liveUpdate.status === 'ok' ? EM_D : '#D97706'}">مباشر</span></div><p id="liveTickerText" class="text-xs text-gray-600 truncate flex-1 transition-opacity duration-300" style="direction:rtl">${liveUpdate.text} • ${liveUpdate.en}</p></div>`;
    let savedHtml = `<div class="mb-4"><div class="flex items-center justify-between mb-2.5"><span class="text-sm font-bold text-gray-800">مواقعي المحفوظة</span><span class="text-xs text-gray-400">Saved Locations</span></div><div class="flex gap-2 overflow-x-auto hide-scroll pb-1">`;
    user.savedLocations.forEach(loc => { savedHtml += `<button data-loc='${JSON.stringify(loc)}' class="loc-trigger shrink-0 rounded-2xl p-3 flex flex-col items-center gap-1.5 shadow-sm active:scale-95 transition" style="min-width:80px; background:${loc.color}; border:1.5px solid ${loc.accent}22"><div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:${loc.accent}18"><i data-lucide="${loc.icon === 'home' ? 'home' : loc.icon === 'work' ? 'briefcase' : 'star'}" size="15" color="${loc.accent}"></i></div><span class="text-xs font-bold" style="color:${loc.accent}">${loc.label}</span><span class="text-xs text-gray-500 text-center leading-tight" style="font-size:9px">${loc.address}</span></button>`; });
    savedHtml += `<button data-action="openSync" class="shrink-0 rounded-2xl p-3 flex flex-col items-center gap-1.5 border-2 border-dashed" style="min-width:80px; border-color:${EM_M}"><div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:${EM_L}"><i data-lucide="plus" size="16" color="${EM}"></i></div><span class="text-xs font-bold" style="color:${EM_D}">أضف</span></button></div></div>`;
    let routesHtml = `<div class="mb-4"><div class="flex items-center justify-between mb-2.5"><div class="flex items-center gap-1.5"><i data-lucide="sparkles" size="14" color="${EM}"></i><span class="text-sm font-bold text-gray-800">محرك المسارات الذكي</span></div><span class="text-xs text-gray-400">AI Routing Engine</span></div>`;
    user.frequentRoutes.forEach(fr => {
      routesHtml += `<div class="mb-3"><div class="flex items-center gap-1.5 mb-2"><i data-lucide="route" size="12" color="${EM}"></i><span class="text-xs font-bold text-gray-600">${fr.name}</span><span class="text-xs text-gray-400 mr-auto">تكرار ${fr.frequency}×</span></div>`;
      ['fastest', 'budget'].forEach(key => {
        const rd = fr.routes[key];
        routesHtml += `<div class="route-card mb-2 rounded-2xl bg-white shadow-sm overflow-hidden" style="border:1.5px solid ${rd.color}33" data-fr='${JSON.stringify({route:fr, routeData:rd})}'><button class="card-header w-full p-3.5 text-right"><div class="flex items-center justify-between mb-2"><div class="flex items-center gap-2"><div class="w-7 h-7 rounded-xl flex items-center justify-center" style="background:${rd.bg}; color:${rd.color}">${key === 'fastest' ? '<i data-lucide="zap" size="13"></i>' : '<i data-lucide="dollar-sign" size="13"></i>'}</div><span class="text-sm font-bold text-gray-800">المسار ${rd.label}</span><span class="text-xs text-gray-400">• ${rd.labelEn}</span></div><div class="expand-icon"><i data-lucide="chevron-down" size="14" class="text-gray-400"></i></div></div><div class="flex items-center gap-1 flex-row-reverse justify-end mb-2.5">${rd.steps.map((s,j) => `<div class="flex items-center gap-1">${j>0?'<i data-lucide="arrow-right" size="8" class="text-gray-300" style="transform:rotate(180deg)"></i>':''}<div class="flex items-center gap-1 rounded-xl px-2 py-0.5 border border-gray-200" style="background:${typeStyle(s.type).bg}"><i data-lucide="${typeStyle(s.type).ic}" size="12"></i><span class="text-xs text-gray-600">${s.line || s.from}</span></div></div>`).join('')}</div><div class="flex items-center gap-3"><div class="flex items-center gap-1"><i data-lucide="clock" size="11" color="${rd.color}"></i><span class="text-sm font-bold" style="color:${rd.color}">${rd.totalDuration} د</span></div><div class="w-px h-3.5 bg-gray-200"></div><div class="flex items-center gap-1"><i data-lucide="trending-up" size="11" class="text-gray-400"></i><span class="text-sm font-bold text-gray-700">${rd.totalCost} ج</span></div><div class="mr-auto"><button class="start-trip-btn rounded-xl px-3 py-1 text-xs font-bold transition active:scale-95" style="background:${rd.color}18; color:${rd.color}" data-route='${JSON.stringify({route:fr, routeData:rd})}'>ابدأ</button></div></div></button><div class="expanded-steps hidden border-t px-4 py-3 space-y-2.5" style="border-color:${rd.color}22; background:${rd.bg}50">${rd.steps.map(s => `<div class="flex items-start gap-2.5"><div class="w-6 h-6 rounded-lg flex items-center justify-center shrink-0 mt-0.5" style="background:${typeStyle(s.type).bg}"><i data-lucide="${typeStyle(s.type).ic}" size="12"></i></div><div class="flex-1"><p class="text-xs font-bold text-gray-800">${s.line || "مشياً على الأقدام"}</p><p class="text-xs text-gray-500">${s.from} → ${s.to}${s.stops ? ` • ${s.stops} محطات` : ""}</p></div><span class="text-xs font-semibold shrink-0" style="color:${rd.color}">${s.duration} د</span></div>`).join('')}</div></div>`;
      });
      routesHtml += `</div>`;
    });
    routesHtml += `</div>`;
    let historyHtml = `<div><div class="flex items-center justify-between mb-2.5"><div class="flex items-center gap-1.5"><i data-lucide="history" size="14" color="#6B7280"></i><span class="text-sm font-bold text-gray-800">سجل الرحلات</span></div><span class="text-xs text-gray-400">Route History</span></div><div class="space-y-2">`;
    user.routeHistory.slice(0,3).forEach(rh => { historyHtml += `<div class="bg-white rounded-2xl px-4 py-3 shadow-sm flex items-center gap-3" style="border:1px solid ${BORDER}"><div class="w-8 h-8 rounded-xl flex items-center justify-center shrink-0" style="background:${EM_L}"><i data-lucide="check-circle" size="14" color="${EM_D}"></i></div><div class="flex-1"><p class="text-xs font-bold text-gray-800">${rh.from} → ${rh.to}</p><p class="text-xs text-gray-400">${rh.date}</p></div><div class="text-left"><p class="text-xs font-bold" style="color:${EM_D}">${rh.duration}</p><p class="text-xs text-gray-400">${rh.cost} ج</p></div></div>`; });
    historyHtml += `</div></div>`;
    return `<div class="space-y-4 fade-in"><div class="rounded-3xl overflow-hidden shadow-lg relative" style="border:2px solid ${EM_M}}"><div class="absolute top-3 right-3 z-10"><div class="glass rounded-xl px-2.5 py-1.5 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full animate-pulse" style="background:${EM}"></span><span class="text-xs font-semibold" style="color:${EM_D}">موقعي الحالي</span></div></div><div class="absolute bottom-3 left-3 z-10"><button data-action="openSync" class="glass rounded-xl px-2.5 py-1.5 flex items-center gap-1.5" style="border:1px solid ${EM_M}"><i data-lucide="database" size="11" color="${EM_D}"></i><span class="text-xs text-gray-600">مزامنة البيانات</span></button></div>${CairoMapSVG(155)}</div>${tickerHtml}${savedHtml}${routesHtml}${historyHtml}</div>`;
  }
  function renderMapPage() { return `<div class="fade-in space-y-3"><div class="flex gap-2 pb-1 overflow-x-auto hide-scroll">${[{k:"all",l:"الكل",c:"#374151"},{k:"metro",l:"مترو",c:"#EF4444"},{k:"mono",l:"مونوريل",c:"#8B5CF6"},{k:"bus",l:"أتوبيس",c:"#3B82F6"}].map(f=>`<button data-filter="${f.k}" class="filter-map-btn shrink-0 rounded-xl px-3 py-1.5 text-xs font-bold transition" style="background:#F3F4F6; color:${f.c}">${f.l}</button>`).join('')}</div><div class="rounded-3xl overflow-hidden shadow-lg" style="border:2px solid ${EM_M}; height:220px">${CairoMapSVG(220)}</div><div id="mapSchedulesContainer"></div></div>`; }
  function renderTicketsPage() { const totalSpent = appState.userData.routeHistory.reduce((s,r)=>s+r.cost,0); return `<div class="fade-in space-y-4"><div class="rounded-2xl p-4 shadow-sm" style="background:linear-gradient(135deg,${EM},${EM_D})"><p class="text-xs text-emerald-200 mb-1">إجمالي الإنفاق هذا الأسبوع</p><p class="text-3xl font-black text-white">${totalSpent} ج</p><p class="text-xs text-emerald-300">من ${appState.userData.routeHistory.length} رحلات مسجّلة</p></div><p class="text-sm font-bold text-gray-800">تذاكري النشطة • Active Tickets</p><div class="flex gap-3 overflow-x-auto pb-1 hide-scroll"><div class="shrink-0 rounded-2xl p-4 shadow-md w-52" style="background:linear-gradient(135deg,#EF4444,#EF4444CC);color:white"><div class="flex justify-between mb-3"><div class="w-8 h-8 rounded-xl bg-white bg-opacity-20 flex items-center justify-center"><i data-lucide="train" size="16"></i></div><span class="text-xs bg-white bg-opacity-20 rounded-full px-2 py-0.5">مترو</span></div><p class="text-2xl font-black">7 رحلة</p><p class="text-xs opacity-70 mb-3">متبقي من 10</p><div class="bg-white bg-opacity-20 rounded-full h-1.5 mb-2"><div class="h-full rounded-full bg-white" style="width:70%"></div></div><p class="text-xs opacity-70">صالح حتى ٣٠ أبريل ٢٠٢٥</p></div><div class="shrink-0 rounded-2xl p-4 shadow-sm w-36 flex flex-col items-center justify-center gap-2 border-2 border-dashed" style="border-color:${EM_M}"><div class="w-10 h-10 rounded-full flex items-center justify-center" style="background:${EM_L}"><i data-lucide="plus" size="20" color="${EM}"></i></div><span class="text-xs font-bold text-center" style="color:${EM_D}">إضافة تذكرة</span></div></div><p class="text-sm font-bold text-gray-800">آخر الرحلات • Recent Trips</p><div class="space-y-2">${appState.userData.routeHistory.map(rh=>`<div class="bg-white rounded-2xl px-4 py-3 shadow-sm flex items-center gap-3" style="border:1px solid ${BORDER}"><div class="w-8 h-8 rounded-xl flex items-center justify-center shrink-0" style="background:${EM_L}"><i data-lucide="check-circle" size="14" color="${EM_D}"></i></div><div class="flex-1"><p class="text-xs font-bold text-gray-800">${rh.from} → ${rh.to}</p><p class="text-xs text-gray-400">${rh.date}</p></div><div class="flex items-center gap-1.5">${rh.transport.map(t=>`<i data-lucide="${typeStyle(t).ic}" size="12"></i>`).join('')}<span class="text-sm font-black" style="color:${EM_D}">${rh.cost} ج</span></div></div>`).join('')}</div><div class="bg-white rounded-2xl shadow-sm overflow-hidden" style="border:1.5px solid ${BORDER}"><div class="px-4 py-3 flex items-center gap-2" style="background:${GRAY}"><i data-lucide="credit-card" size="15" color="${EM_D}"></i><span class="text-sm font-bold text-gray-800">جدول الأسعار • Fare Table</span></div>${[{label:"مترو – رحلة واحدة",price:7},{label:"مترو – ١٠ رحلات",price:60},{label:"أتوبيس – رحلة",price:3},{label:"مونوريل – رحلة",price:10},{label:"مونوريل – ١٠ رحلات",price:85}].map(f=>`<div class="flex items-center justify-between px-4 py-3 border-t border-gray-100"><div class="flex items-center gap-2"><i data-lucide="train" size="14" class="text-gray-500"></i><span class="text-sm text-gray-700">${f.label}</span></div><div class="flex items-center gap-2"><span class="text-sm font-bold" style="color:${EM_D}">${f.price} ج</span><button class="buy-ticket text-xs rounded-xl px-2.5 py-1 font-bold transition" style="background:${EM_L};color:${EM_D}">شراء</button></div></div>`).join('')}</div></div>`; }
  function renderProfilePage() { const totalTrips = appState.userData.routeHistory.length; const totalSaved = appState.userData.routeHistory.reduce((s,r)=>s+r.cost,0); return `<div class="fade-in space-y-4"><div class="flex flex-col items-center py-4"><div class="w-20 h-20 rounded-3xl flex items-center justify-center text-white text-3xl font-black shadow-xl mb-3" style="background:linear-gradient(135deg,${EM},${EM_D})">${appState.userData.profile.avatar}</div><p class="text-lg font-black text-gray-800">${appState.userData.profile.name}</p><p class="text-sm text-gray-400">${appState.userData.profile.location}</p><p class="text-xs text-gray-300 mt-1">مستخدم رفيق منذ ${appState.userData.profile.memberSince}</p></div><div class="grid grid-cols-3 gap-2.5"><div class="rounded-2xl p-3 text-center shadow-sm bg-white" style="border:1.5px solid ${BORDER}"><div class="w-8 h-8 rounded-xl flex items-center justify-center mx-auto mb-1.5" style="background:#3B82F615;color:#3B82F6"><i data-lucide="navigation" size="16"></i></div><p class="text-base font-black text-gray-800">${totalTrips}</p><p class="text-xs text-gray-400">الرحلات</p></div><div class="rounded-2xl p-3 text-center shadow-sm bg-white" style="border:1.5px solid ${BORDER}"><div class="w-8 h-8 rounded-xl flex items-center justify-center mx-auto mb-1.5" style="background:${EM}15;color:${EM}"><i data-lucide="trending-up" size="16"></i></div><p class="text-base font-black text-gray-800">${totalSaved} ج</p><p class="text-xs text-gray-400">المصروف</p></div><div class="rounded-2xl p-3 text-center shadow-sm bg-white" style="border:1.5px solid ${BORDER}"><div class="w-8 h-8 rounded-xl flex items-center justify-center mx-auto mb-1.5" style="background:#F59E0B15;color:#F59E0B"><i data-lucide="book-marked" size="16"></i></div><p class="text-base font-black text-gray-800">${appState.userData.savedLocations.length}</p><p class="text-xs text-gray-400">المواقع</p></div></div><button data-action="openSync" class="w-full flex items-center gap-3 p-4 rounded-2xl shadow-sm transition" style="background:linear-gradient(135deg,${EM_L},#A7F3D0);border:1.5px solid ${EM_M}"><div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:${EM_D}"><i data-lucide="database" size="18" class="text-white"></i></div><div class="flex-1 text-right"><p class="text-sm font-bold" style="color:${EM_D}">إدارة مصادر البيانات</p><p class="text-xs text-gray-500">ربط مصادر خارجية واستيراد JSON</p></div><i data-lucide="chevron-right" size="16" color="${EM_D}" style="transform:rotate(180deg)"></i></button></div>`; }
  function renderCarPage() { return `<div class="fade-in space-y-3"><div class="rounded-2xl p-4 shadow-sm" style="background:linear-gradient(135deg,${EM},${EM_D})"><div class="flex items-center gap-3 mb-1"><i data-lucide="car" size="24" class="text-white"></i><div><p class="text-base font-black text-white">وضع أصحاب السيارات</p><p class="text-xs text-emerald-200">Car Owner Mode</p></div></div><p class="text-xs text-emerald-100">معلومات مرورية لحظية لمدينة القاهرة والجيزة</p></div>${[{icon:"alert-triangle",label:"حالة الطرق",val:"ازدحام خفيف",c:"#F59E0B"},{icon:"navigation",label:"كاميرات المرور",val:"فعّالة",c:EM},{icon:"map-pin",label:"مواقف السيارات",val:"٣ أماكن قريبة",c:"#3B82F6"},{icon:"fuel",label:"أسعار البنزين",val:"بنزين ٩٢: ١١.٥٠ ج",c:"#EF4444"}].map(it=>`<div class="bg-white rounded-2xl shadow-sm p-4 flex items-center gap-3" style="border:1.5px solid ${it.c}22"><div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style="background:${it.c}15;color:${it.c}"><i data-lucide="${it.icon}" size="18"></i></div><div class="flex-1"><p class="text-sm font-bold text-gray-800">${it.label}</p><p class="text-xs text-gray-400">${it.label}</p></div><div class="text-left"><p class="text-xs font-bold" style="color:${it.c}">${it.val}</p></div></div>`).join('')}</div>`; }
  function renderBottomNav() { const items = [{key:"home",icon:"home",label:"الرئيسية"},{key:"map",icon:"map",label:"الخريطة"},{key:"tickets",icon:"ticket",label:"التذاكر"},{key:"profile",icon:"user",label:"حسابي"}]; return `<div class="shrink-0 px-3 pb-6 pt-2 bg-white/95 backdrop-blur-lg border-t border-gray-200"><div class="flex justify-around">${items.map(n=>`<button data-nav="${n.key}" class="flex flex-col items-center gap-0.5 py-1 px-3 rounded-2xl transition ${appState.nav === n.key && appState.mode === 'public' ? 'text-emerald-600 bg-emerald-50' : 'text-gray-400'}" style="${appState.nav === n.key && appState.mode === 'public' ? `color:${EM};background:${EM_L}` : ''}"><i data-lucide="${n.icon}" size="21"></i><span class="text-xs font-medium">${n.label}</span>${appState.nav === n.key && appState.mode === 'public' ? `<span class="w-1 h-1 rounded-full" style="background:${EM}"></span>` : ''}</button>`).join('')}</div></div>`; }

  // overlays (simplified dynamic)
  function renderSearchOverlay() { /* implemented via modal on demand */ }
  function renderSyncOverlay() { /* implemented via modal on demand */ }
  function renderTripOverlay() { /* implemented via modal on demand */ }

  function attachGlobalEvents() {
    document.querySelectorAll('[data-action="openSearch"]').forEach(el => el.addEventListener('click', () => { appState.showSearch = true; render(); }));
    document.querySelectorAll('[data-action="openSync"]').forEach(el => el.addEventListener('click', () => { appState.showSync = true; render(); }));
    document.querySelectorAll('[data-mode]').forEach(btn => btn.addEventListener('click', (e) => { appState.mode = btn.dataset.mode; if(appState.mode === 'public') appState.nav = 'home'; render(); }));
    document.querySelectorAll('[data-nav]').forEach(btn => btn.addEventListener('click', () => { appState.mode = 'public'; appState.nav = btn.dataset.nav; render(); }));
    document.querySelectorAll('.loc-trigger').forEach(btn => btn.addEventListener('click', () => { const loc = JSON.parse(btn.dataset.loc); appState.tripDetail = { trip: loc, routeData: null }; render(); }));
    document.querySelectorAll('.start-trip-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const data = JSON.parse(btn.dataset.route); appState.tripDetail = { trip: data.route, routeData: data.routeData }; render(); }));
    document.querySelectorAll('.card-header').forEach(header => { header.addEventListener('click', () => { const stepsDiv = header.parentElement.querySelector('.expanded-steps'); if(stepsDiv) stepsDiv.classList.toggle('hidden'); const icon = header.querySelector('.expand-icon i'); if(icon && icon.getAttribute('data-lucide') === 'chevron-down') icon.setAttribute('data-lucide','chevron-up'); else if(icon) icon.setAttribute('data-lucide','chevron-down'); lucide.createIcons(); }); });
  }
  function startLiveTicker() { if(liveInterval) clearInterval(liveInterval); liveInterval = setInterval(() => { const updates = appState.userData.liveUpdates; if(updates.length){ appState.liveIdx = (appState.liveIdx+1)%updates.length; const txt = document.getElementById('liveTickerText'); if(txt) txt.style.opacity='0'; setTimeout(()=>{ if(txt) { txt.innerText = `${updates[appState.liveIdx].text} • ${updates[appState.liveIdx].en}`; txt.style.opacity='1'; } },150); } }, 3800); }
  // initial render
  render();
</script>
</body>
</html>
